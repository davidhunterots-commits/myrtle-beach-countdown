<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>84 Days to Myrtle Beach</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0a08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Myrtle Beach">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap');

  :root {
    --parchment: #e8dcc0;
    --parchment-dark: #d4c4a0;
    --ink: #2b1f15;
    --ink-faded: #4a3a28;
    --wax-red: #8b2e1f;
    --wax-red-dark: #6b2015;
    --gold: #a8823a;
    --gold-light: #c9a456;
    --sea-deep: #1a3a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background:
      radial-gradient(ellipse at top left, rgba(139,46,31,0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(26,58,58,0.12), transparent 50%),
      var(--parchment);
    background-image:
      radial-gradient(ellipse at top left, rgba(139,46,31,0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(26,58,58,0.12), transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(75,58,40,0.015) 2px, rgba(75,58,40,0.015) 4px),
      linear-gradient(135deg, var(--parchment) 0%, var(--parchment-dark) 100%);
    color: var(--ink);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 18px;
    position: relative;
    overflow-x: hidden;
  }

  /* Vignette / aged edges */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 55%, rgba(43,31,21,0.25) 100%);
    z-index: 0;
  }

  .watermark {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(70vw, 480px);
    height: min(70vw, 480px);
    opacity: 0.045;
    z-index: 0;
    pointer-events: none;
  }

  .scroll {
    position: relative;
    z-index: 1;
    max-width: 640px;
    width: 100%;
    border: 2px solid var(--gold);
    outline: 1px solid rgba(75,58,40,0.4);
    outline-offset: 6px;
    padding: 44px 36px 38px;
    background: rgba(232, 220, 192, 0.4);
    box-shadow:
      0 0 0 1px rgba(168,130,58,0.2),
      0 18px 50px rgba(26,20,12,0.35),
      inset 0 0 90px rgba(139,46,31,0.06);
  }

  .corner {
    position: absolute;
    width: 26px;
    height: 26px;
    border: 2px solid var(--gold);
  }
  .corner.tl { top: -6px; left: -6px; border-right: none; border-bottom: none; }
  .corner.tr { top: -6px; right: -6px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: -6px; left: -6px; border-right: none; border-top: none; }
  .corner.br { bottom: -6px; right: -6px; border-left: none; border-top: none; }

  .eyebrow {
    font-family: 'Special Elite', cursive;
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-faded);
    text-align: center;
    margin-bottom: 10px;
  }

  .eyebrow::before, .compass-rule {
    content: "";
  }

  .rule {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 14px 0 22px;
    color: var(--gold);
  }
  .rule .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .rule .mark {
    font-size: 1.3rem;
    transform: rotate(0deg);
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    text-align: center;
    font-size: clamp(1.7rem, 5.5vw, 2.5rem);
    letter-spacing: 0.03em;
    color: var(--wax-red-dark);
    text-shadow: 1px 1px 0 rgba(168,130,58,0.3);
    line-height: 1.25;
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    font-style: italic;
    color: var(--ink-faded);
    font-size: 1.05rem;
    margin-bottom: 36px;
  }

  /* Jolly Roger flag panel */
  .crest-wrap {
    display: flex;
    justify-content: center;
    margin: 8px 0 30px;
  }

  .crest {
    position: relative;
    width: 100%;
    max-width: 528px;
    aspect-ratio: 4 / 3;
    border-radius: 4px;
    overflow: hidden;
    background:
      repeating-linear-gradient(100deg, rgba(255,255,255,0.025) 0px, transparent 18px, rgba(0,0,0,0.06) 36px, transparent 54px),
      radial-gradient(ellipse at 30% 20%, #232019, #0c0a08 75%);
    box-shadow:
      0 14px 30px rgba(26,20,12,0.55),
      inset 0 0 50px rgba(0,0,0,0.6),
      inset 0 0 0 1px rgba(168,130,58,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px solid var(--gold);
  }

  .crest svg {
    width: 90%;
    height: 90%;
    color: #e9e1cf;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.6));
    opacity: 0.55;
  }

  .days-banner {
    position: absolute;
    top: 46%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
    pointer-events: none;
  }

  .days-banner .num {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 4.4rem;
    line-height: 1;
    color: var(--gold-light);
    -webkit-text-stroke: 1.5px #2b1f15;
    text-shadow:
      0 0 14px rgba(0,0,0,0.85),
      0 0 28px rgba(0,0,0,0.6),
      2px 2px 0 rgba(0,0,0,0.5);
  }

  .days-banner .label {
    font-family: 'Special Elite', cursive;
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--parchment);
    text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 2px 3px rgba(0,0,0,0.8);
    margin-top: 0;
  }

  /* ship's log grid for hrs/min/sec */
  .log {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 32px;
  }

  .log-entry {
    text-align: center;
    border: 1px solid rgba(75,58,40,0.35);
    background: rgba(255,255,255,0.15);
    padding: 14px 6px 12px;
    position: relative;
  }

  .log-entry .val {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 5vw, 2.1rem);
    color: var(--sea-deep);
    font-variant-numeric: tabular-nums;
  }

  .log-entry .lbl {
    font-family: 'Special Elite', cursive;
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-top: 4px;
  }

  .destination {
    text-align: center;
    font-family: 'Special Elite', cursive;
    font-size: 0.85rem;
    color: var(--ink-faded);
    letter-spacing: 0.04em;
    border-top: 1px solid rgba(75,58,40,0.3);
    padding-top: 18px;
  }

  .destination strong {
    color: var(--wax-red-dark);
  }

  .arrived {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    color: var(--wax-red-dark);
    padding: 30px 0;
  }

  @media (prefers-reduced-motion: no-preference) {
    .crest svg {
      animation: bob 5s ease-in-out infinite;
    }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  :focus-visible {
    outline: 2px solid var(--wax-red);
    outline-offset: 3px;
  }
</style>
</head>
<body>

  <svg class="watermark" viewBox="0 0 200 200" aria-hidden="true">
    <circle cx="100" cy="78" r="38" fill="none" stroke="#2b1f15" stroke-width="3"/>
    <circle cx="84" cy="72" r="7" fill="#2b1f15"/>
    <circle cx="116" cy="72" r="7" fill="#2b1f15"/>
    <path d="M88 96 Q100 106 112 96" fill="none" stroke="#2b1f15" stroke-width="3" stroke-linecap="round"/>
    <path d="M70 110 Q60 160 30 185 M70 110 Q75 165 55 195 M130 110 Q140 160 170 185 M130 110 Q125 165 145 195" fill="none" stroke="#2b1f15" stroke-width="5" stroke-linecap="round"/>
  </svg>

  <div class="scroll">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="eyebrow">Ship&rsquo;s Log &middot; Reckoning of Days</div>
    <div class="rule"><span class="line"></span><span class="mark">&#9760;</span><span class="line"></span></div>

    <h1>Countdown to Landfall</h1>
    <p class="subtitle">The course is set for Myrtle Beach, 12th of September</p>

    <div id="active-view">
      <div class="crest-wrap">
        <div class="crest">
          <svg viewBox="0 0 200 160" aria-hidden="true">
            <defs>
              <linearGradient id="boneShade" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f5efe0"/>
                <stop offset="100%" stop-color="#cfc4a8"/>
              </linearGradient>
              <radialGradient id="skullShade2" cx="38%" cy="25%" r="75%">
                <stop offset="0%" stop-color="#f7f1e3"/>
                <stop offset="100%" stop-color="#d4c8aa"/>
              </radialGradient>
            </defs>

            <!-- crossbones -->
            <g>
              <g transform="translate(100,100) rotate(-38)">
                <rect x="-78" y="-7" width="156" height="14" rx="7" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.5"/>
                <circle cx="-78" cy="0" r="13" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.5"/>
                <circle cx="78" cy="0" r="13" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.5"/>
                <circle cx="-83" cy="-6" r="6" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.2"/>
                <circle cx="-83" cy="6" r="6" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.2"/>
                <circle cx="83" cy="-6" r="6" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.2"/>
                <circle cx="83" cy="6" r="6" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.2"/>
              </g>
              <g transform="translate(100,100) rotate(38)">
                <rect x="-78" y="-7" width="156" height="14" rx="7" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.5"/>
                <circle cx="-78" cy="0" r="13" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.5"/>
                <circle cx="78" cy="0" r="13" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.5"/>
                <circle cx="-83" cy="-6" r="6" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.2"/>
                <circle cx="-83" cy="6" r="6" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.2"/>
                <circle cx="83" cy="-6" r="6" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.2"/>
                <circle cx="83" cy="6" r="6" fill="url(#boneShade)" stroke="#3a3122" stroke-width="1.2"/>
              </g>
            </g>

            <!-- skull -->
            <g transform="translate(100,72)">
              <path d="M0 -54 C-28 -54 -44 -34 -44 -10 C-44 8 -36 20 -25 29 L-25 44 C-25 49 -21 53 -16 53 L-11 53 L-11 61 C-11 65.5 -7.5 69 -3 69 L3 69 C7.5 69 11 65.5 11 61 L11 53 L16 53 C21 53 25 49 25 44 L25 29 C36 20 44 8 44 -10 C44 -34 28 -54 0 -54 Z"
                    fill="url(#skullShade2)" stroke="#352b1d" stroke-width="2.2"/>

              <!-- cranial shading lines -->
              <path d="M-20 -46 C-30 -36 -33 -22 -29 -8" fill="none" stroke="#b8a983" stroke-width="1.4" opacity="0.7"/>
              <path d="M14 -50 C 22 -42 27 -28 25 -14" fill="none" stroke="#b8a983" stroke-width="1.4" opacity="0.5"/>

              <!-- eye sockets -->
              <path d="M-30 -8 C-31 -18 -23 -27 -12 -27 C-15 -21 -16 -13 -12 -5 C-19 -1 -28 -2 -30 -8 Z" fill="#241c12"/>
              <path d="M30 -8 C31 -18 23 -27 12 -27 C15 -21 16 -13 12 -5 C19 -1 28 -2 30 -8 Z" fill="#241c12"/>
              <circle cx="-19" cy="-13" r="2.2" fill="#0c0905"/>
              <circle cx="19" cy="-13" r="2.2" fill="#0c0905"/>

              <!-- nasal cavity -->
              <path d="M0 -4 L-7 12 C-4 15 4 15 7 12 Z" fill="#241c12"/>

              <!-- cheekbone lines -->
              <path d="M-30 8 C-26 14 -20 18 -15 19" fill="none" stroke="#5a4c34" stroke-width="1.3"/>
              <path d="M30 8 C26 14 20 18 15 19" fill="none" stroke="#5a4c34" stroke-width="1.3"/>

              <!-- jaw / teeth -->
              <path d="M-16 29 L16 29" stroke="#352b1d" stroke-width="1.3"/>
              <path d="M-13 29 L-13 38 M-7.5 29 L-7.5 39 M-2.5 29 L-2.5 40 M2.5 29 L2.5 40 M7.5 29 L7.5 39 M13 29 L13 38"
                    stroke="#352b1d" stroke-width="1.3"/>
            </g>
          </svg>

          <div class="days-banner">
            <div class="num" id="days-num">--</div>
            <div class="label">Days to Go</div>
          </div>
        </div>
      </div>

      <div class="log">
        <div class="log-entry">
          <div class="val" id="hours">00</div>
          <div class="lbl">Bells (Hrs)</div>
        </div>
        <div class="log-entry">
          <div class="val" id="minutes">00</div>
          <div class="lbl">Minutes</div>
        </div>
        <div class="log-entry">
          <div class="val" id="seconds">00</div>
          <div class="lbl">Seconds</div>
        </div>
      </div>

      <div class="destination">Destination: <strong>Myrtle Beach</strong> &mdash; arriving September 12, 2026. Mark it well, sailor.</div>
    </div>

    <div id="arrived-view" style="display:none;">
      <div class="arrived">⚓ Land Ho! Myrtle Beach awaits. ⚓</div>
    </div>
  </div>

<script>
  const target = new Date("2026-09-12T00:00:00-04:00");

  function update() {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) {
      document.getElementById('active-view').style.display = 'none';
      document.getElementById('arrived-view').style.display = 'block';
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById('days-num').textContent = days;
    document.getElementById('hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
    document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
  }

  update();
  setInterval(update, 1000);
</script>

</body>
</html>
